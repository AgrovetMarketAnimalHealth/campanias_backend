services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: campanias_app
    user: root
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - campanias
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: campanias
      DB_USERNAME: campanias_user
      DB_PASSWORD: password

  nginx:
    image: nginx:alpine
    container_name: campanias_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - campanias

  mysql:
    image: mysql:8.0
    container_name: campanias_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: campanias
      MYSQL_USER: campanias_user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - campanias
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "campanias_user", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    container_name: campanias_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    networks:
      - campanias

  node:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    container_name: campanias_node
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - node_modules_data:/var/www/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - app
    networks:
      - campanias
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NODE_ENV: development
      VITE_PORT: 5173
      VITE_HOST: 0.0.0.0

  composer:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: campanias_composer
    working_dir: /var/www
    volumes:
      - .:/var/www
    entrypoint: ["composer"]
    networks:
      - campanias

networks:
  campanias:
    driver: bridge

volumes:
  mysql_data:
  node_modules_data: